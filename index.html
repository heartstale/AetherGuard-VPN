<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaSecure VPN</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app" id="app">

  <div class="top-bar">
    <div class="logo">NovaSecure</div>
    <div class="plan">Premium</div>
  </div>

  <div class="connection-card">

    <div class="status-block">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">Disconnected</div>
    </div>

    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="info">
      <div><span>Location:</span> <span id="locationText">Germany</span></div>
      <div><span>IP:</span> <span id="ipText">—</span></div>
      <div><span>Ping:</span> <span id="pingText">—</span></div>
    </div>

    <select id="locationSelect">
      <option>Germany</option>
      <option>United States</option>
      <option>France</option>
      <option>Japan</option>
      <option>Canada</option>
    </select>

    <button id="connectBtn">Connect</button>

  </div>

</div>

<!-- LOVE SCREEN -->
<div class="love-screen hidden" id="loveScreen">
  <div class="love-content">
    <div class="heart">❤️</div>
    <h1>Secure Connection Established</h1>
    <p>
      Connected to: <strong>Your Heart</strong><br>
      Encryption: Infinite Love Protocol<br>
      Latency: 0ms (because we’re synced)<br><br>
      I choose you. Every time.
    </p>
  </div>
</div>

<script src="./script.js"></script>
</body>
</html>
